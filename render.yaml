# render.yaml — Render.com Blueprint
# Deploy with: render blueprint sync

services:
  # Backend API
  - type: web
    name: soins-expert-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soins-expert-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://soins-expert-frontend.onrender.com
      - key: AUTH_SENDER_EMAIL
        value: rh@soins-expert-plus.com
      - key: AUTH_SMTP_USER
        sync: false
      - key: AUTH_SMTP_PASS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: CHATBOT_PROVIDER
        value: deepseek
      - key: CHATBOT_MODEL
        value: deepseek-reasoner
      - key: CHATBOT_API_KEY
        sync: false
      - key: CHATBOT_BASE_URL
        value: https://api.deepseek.com
      - key: TIMESHEET_AI_PROVIDER
        value: deepseek
      - key: TIMESHEET_TEXT_MODEL
        value: deepseek-reasoner
      - key: OPENAI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: OPENAI_REASONING_EFFORT
        value: high
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: paie@soins-expert-plus.com
      - key: SMTP_PASS
        sync: false  # Set manually
      - key: BILLING_SENDER_EMAIL
        value: paie@soins-expert-plus.com
      - key: BILLING_EMAIL_TRANSPORT
        value: smtp
      - key: BILLING_GMAIL_CLIENT_ID
        sync: false
      - key: BILLING_GMAIL_CLIENT_SECRET
        sync: false
      - key: AUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: AUTH_GOOGLE_CLIENT_SECRET
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: AUTOMATION_TIMEZONE
        value: America/Toronto
      - key: TIMESHEET_REMINDER_ENABLED
        value: "true"
      - key: TIMESHEET_REMINDER_HOUR
        value: "9"
      - key: TIMESHEET_REMINDER_MINUTE
        value: "0"
      - key: TIMESHEET_REMINDER_TO
        value: paie@soins-expert-plus.com
      - key: TIMESHEET_REMINDER_BCC
        value: ines_achour@hotmail.ca,vaniecote1960@hotmail.fr,sindygaetan@gmail.com,olivierkabongo547@gmail.com,sunly016@hotmail.com,alhachsoul@gmail.com,romain.gavet11@gmail.com,jo_anne821@hotmail.com,melanie.choquette868@gmail.com,lovely.estinvil@hotmail.com,mukala.chance@hotmail.com,hemerciennedagaud23@gmail.com,cozzi.tan007@gmail.com,gemimalacombe11@yahoo.com,line.gosselin@icloud.com,mirlandemmoise@gmail.com,stpedro@hotmail.ca,williamhamel@hotmail.fr,malika0106@hotmail.com,marjorietremblay@live.ca
      - key: TIMESHEET_INBOX_MONITOR_ENABLED
        value: "true"
      - key: TIMESHEET_INBOX_MAX_RESULTS
        value: "100"
      - key: TIMESHEET_INBOX_SEARCH
        value: newer_than:14d
      - key: TIMESHEET_AUTO_SCHEDULE_SYNC_ENABLED
        value: "true"
      - key: TIMESHEET_AUTO_DRAFT_ENABLED
        value: "true"
      - key: TIMESHEET_AUTO_DRAFT_MIN_CONFIDENCE
        value: "0.68"
      - key: TIMESHEET_ATTACHMENT_MODEL
        value: local-ocr
      - key: TIMESHEET_ATTACHMENT_REASONING_EFFORT
        value: high
    healthCheckPath: /api/health

  # Frontend (static site)
  - type: web
    name: soins-expert-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://soins-expert-api.onrender.com/api
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: soins-expert-db
    databaseName: soins_expert
    plan: free  # Upgrade to starter ($7/mo) for production
