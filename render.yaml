# render.yaml — Render.com Blueprint
# Deploy with: render blueprint sync

services:
  # Backend API
  - type: web
    name: soins-expert-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: soins-expert-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://soins-expert-plus.com
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: rh@soins-expert-plus.com
      - key: SMTP_PASS
        sync: false  # Set manually
    healthCheckPath: /api/health

  # Frontend (static site)
  - type: web
    name: soins-expert-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: soins-expert-db
    databaseName: soins_expert
    plan: free  # Upgrade to starter ($7/mo) for production
